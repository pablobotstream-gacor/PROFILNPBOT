<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPBOT | Hubungi Kami</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #040d04;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 70% 60% at 15% 15%, rgba(0,200,50,0.22) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 85% 85%, rgba(50,255,80,0.16) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 55% 40%, rgba(0,180,60,0.10) 0%, transparent 50%);
    animation: bgShift 9s ease-in-out infinite alternate;
    z-index: 0;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 38px, rgba(0,255,80,0.03) 38px, rgba(0,255,80,0.03) 39px),
      repeating-linear-gradient(90deg, transparent, transparent 38px, rgba(0,255,80,0.03) 38px, rgba(0,255,80,0.03) 39px);
    z-index: 0;
    pointer-events: none;
  }

  @keyframes bgShift {
    0%   { opacity: 0.8; transform: scale(1); }
    50%  { opacity: 1;   transform: scale(1.06); }
    100% { opacity: 0.9; transform: scale(1.02); }
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    pointer-events: none;
    z-index: 0;
    animation: floatOrb 12s ease-in-out infinite alternate;
  }
  .orb1 { width:320px; height:320px; background:rgba(0,220,60,0.15); top:-100px; left:-100px; animation-duration:13s; }
  .orb2 { width:260px; height:260px; background:rgba(80,255,100,0.12); bottom:-80px; right:-80px; animation-duration:10s; animation-delay:-4s; }
  .orb3 { width:200px; height:200px; background:rgba(0,180,70,0.09); top:40%; left:60%; animation-duration:16s; animation-delay:-7s; }

  @keyframes floatOrb {
    0%   { transform: translate(0,0) scale(1); }
    33%  { transform: translate(25px,-20px) scale(1.1); }
    66%  { transform: translate(-15px,25px) scale(0.95); }
    100% { transform: translate(15px,10px) scale(1.05); }
  }

  .card { position: relative; z-index: 1; }

  .card {
    background: rgba(5,25,10,0.82);
    border: 1px solid rgba(0,220,70,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 0 60px rgba(0,200,60,0.1), inset 0 0 40px rgba(0,80,20,0.15);
    border-radius: 20px;
    padding: 18px 16px;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    
  }

  /* Logo */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .logo-img {
    width: 140px;
    height: auto;
    filter: drop-shadow(0 0 16px rgba(80,255,80,0.4));
    background: transparent;
    mix-blend-mode: screen;
  }

  /* Status badge */
  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,200,100,0.12);
    border: 1px solid rgba(0,200,100,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #00e676;
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: #00e676;
    border-radius: 50%;
    box-shadow: 0 0 6px #00e676;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* QR section */
  .qr-section {
    background: rgba(0,30,10,0.7);
    border: 1px solid rgba(0,200,60,0.15);
    border-radius: 16px;
    padding: 12px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .qr-label {
    font-size: 13px;
    color: #888;
    text-align: center;
  }

  .qr-label span {
    color: #2AABEE;
    font-weight: 700;
  }

  .qr-frame {
    background: white;
    padding: 12px;
    border-radius: 12px;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* We generate QR via API-free SVG pattern */
  .qr-frame img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 4px;
  }

  .qr-hint {
    font-size: 10px;
    color: #555;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* Telegram button */
  .btn-telegram {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: linear-gradient(135deg, #2AABEE, #1a8cd8);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 11px 16px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(42,171,238,0.3);
  }

  .btn-telegram:hover {
    background: linear-gradient(135deg, #3bbcff, #2AABEE);
    box-shadow: 0 6px 28px rgba(42,171,238,0.45);
    transform: translateY(-1px);
  }

  .btn-telegram svg {
    width: 20px;
    height: 20px;
    fill: white;
  }

  /* Username copy box */
  .username-box {
    width: 100%;
    background: rgba(0,30,10,0.7);
    border: 1px solid rgba(0,200,60,0.15);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .username-inner {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .username-label {
    font-size: 10px;
    color: #555;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .username-value {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .copy-btn {
    background: rgba(0,60,20,0.8);
    border: 1px solid rgba(0,200,60,0.2);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .copy-btn:hover {
    background: #2AABEE;
    border-color: #2AABEE;
  }

  .copy-btn svg {
    width: 16px;
    height: 16px;
    fill: #aaa;
  }

  .copy-btn:hover svg {
    fill: white;
  }

  /* Visit website button */
  .btn-web {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: transparent;
    color: #2AABEE;
    border: 1px solid #2AABEE;
    border-radius: 12px;
    padding: 11px 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }

  .btn-web:hover {
    background: rgba(42,171,238,0.1);
    box-shadow: 0 0 20px rgba(42,171,238,0.15);
  }

  .btn-web svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: #2AABEE;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Footer */
  .footer {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .footer p {
    font-size: 10px;
    color: #444;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .footer span {
    color: #666;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #00e676;
    color: #000;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 24px;
    border-radius: 50px;
    transition: transform 0.3s ease;
    z-index: 999;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* Group button */
  .btn-group {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: linear-gradient(135deg, rgba(0,180,60,0.2), rgba(0,120,40,0.3));
    color: #00e676;
    border: 1px solid rgba(0,220,80,0.4);
    border-radius: 12px;
    padding: 11px 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    box-shadow: 0 0 16px rgba(0,200,60,0.15);
  }

  .btn-group:hover {
    background: linear-gradient(135deg, rgba(0,200,70,0.3), rgba(0,160,50,0.4));
    box-shadow: 0 0 28px rgba(0,230,80,0.3);
    transform: translateY(-1px);
  }

  .btn-group svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: #00e676;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
